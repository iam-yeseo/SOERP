<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>업무 매니지먼트</title>
  <meta name="description" content="건설/공사 행정 업무 관리 대시보드" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <!-- 사이드바 (데스크톱) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-logo" data-icon="building2"></span>
        <div class="brand-text">
          <p class="brand-title">업무 매니지먼트</p>
          <p class="brand-sub">건설/공사 행정</p>
        </div>
        <button class="icon-btn drawer-close" data-action="menu-close" aria-label="메뉴 닫기" data-icon="x"></button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-foot">
        MVP · 데이터는 이 브라우저(localStorage)에 저장됩니다.<br />
        백업은 Settings의 JSON 내보내기를 이용하세요.
      </div>
    </aside>
    <div class="drawer-dim" id="drawer-dim" data-action="menu-close"></div>

    <div class="content">
      <!-- 헤더 -->
      <header class="header">
        <button class="icon-btn mobile-only" data-action="menu-open" aria-label="메뉴 열기" data-icon="menu"></button>
        <div class="header-search">
          <span class="search-icon" data-icon="search"></span>
          <input type="search" id="header-search" placeholder="업무 검색 후 Enter" aria-label="업무 검색" />
        </div>
        <div class="header-right">
          <span class="header-date desktop-only" id="header-date"></span>
          <button class="btn btn-primary" data-action="open-new">
            <span data-icon="plus"></span><span class="hide-sm">새 업무 추가</span>
          </button>
        </div>
      </header>

      <main class="main" id="view"></main>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="confirm-root"></div>
  <div id="toast-root" class="toast-root"></div>

  <script src="js/utils.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
