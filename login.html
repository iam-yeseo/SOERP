<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - SOERP</title>
  <meta name="description" content="SOERP - 김소은상회(주) 업무 매니지먼트 로그인" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-body">
  <div class="login-card card">
    <div class="login-brand">
      <span class="brand-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
      </span>
      <div class="brand-text">
        <p class="brand-title">SOERP</p>
        <p class="brand-sub">김소은상회(주) 업무 매니지먼트</p>
      </div>
    </div>

    <h1 class="login-title">로그인</h1>
    <p class="login-sub">업무 데이터는 계정별로 안전하게 보관됩니다.</p>

    <form id="login-form" class="login-form">
      <div>
        <label class="field-label" for="login-email">이메일</label>
        <input class="input" type="email" id="login-email" autocomplete="email" placeholder="name@example.com" required />
      </div>
      <div>
        <label class="field-label" for="login-password">비밀번호</label>
        <input class="input" type="password" id="login-password" autocomplete="current-password" placeholder="6자 이상" minlength="6" required />
      </div>
      <p id="auth-message" class="auth-msg" style="display:none"></p>
      <button type="submit" class="btn btn-primary login-btn" id="btn-signin">로그인</button>
      <button type="button" class="btn btn-outline login-btn" id="btn-signup">회원가입</button>
    </form>

    <p class="login-note">처음 사용하시나요? 이메일과 비밀번호를 입력한 뒤 <b>회원가입</b>을 누르세요.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
